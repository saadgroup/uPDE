<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uPDE — Equation Builder</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ffffff;
  --bg2:      #f6f5f0;
  --bg3:      #efede8;
  --text:     #1a1a18;
  --text2:    #5a5a56;
  --text3:    #9a9890;
  --border:   rgba(0,0,0,0.10);
  --border2:  rgba(0,0,0,0.18);
  --border3:  rgba(0,0,0,0.28);
  --radius:   4px;
  --radius-lg:6px;
  --font:     -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono:     "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  --purple-bg:#EEEDFE; --purple-bd:#AFA9EC; --purple-tx:#3C3489;
  --teal-bg:  #E1F5EE; --teal-bd:  #5DCAA5; --teal-tx:  #085041;
  --blue-bg:  #E6F1FB; --blue-bd:  #85B7EB; --blue-tx:  #0C447C;
  --amber-bg: #FAEEDA; --amber-bd: #EF9F27; --amber-tx: #633806;
  --coral-bg: #FAECE7; --coral-bd: #F0997B; --coral-tx: #4A1B0C;
  --gray-bg:  #F1EFE8; --gray-bd:  #B4B2A9; --gray-tx:  #2C2C2A;
  --green-bg: #EAF3DE; --green-bd: #97C459; --green-tx: #27500A;
  --kw:#7F77DD; --fn:#1D9E75; --st:#854F0B; --nm:#D85A30; --cm:#9a9890;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#1c1c1a; --bg2:#252522; --bg3:#2e2e2b;
    --text:#e8e6df; --text2:#a8a69f; --text3:#6a6864;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14); --border3:rgba(255,255,255,0.22);
    --purple-bg:#26215C; --purple-bd:#534AB7; --purple-tx:#CECBF6;
    --teal-bg:  #04342C; --teal-bd:  #0F6E56; --teal-tx:  #9FE1CB;
    --blue-bg:  #042C53; --blue-bd:  #185FA5; --blue-tx:  #B5D4F4;
    --amber-bg: #412402; --amber-bd: #854F0B; --amber-tx: #FAC775;
    --coral-bg: #4A1B0C; --coral-bd: #993C1D; --coral-tx: #F5C4B3;
    --gray-bg:  #2C2C2A; --gray-bd:  #5F5E5A; --gray-tx:  #D3D1C7;
    --green-bg: #173404; --green-bd: #3B6D11; --green-tx: #C0DD97;
    --kw:#AFA9EC; --fn:#5DCAA5; --st:#FAC775; --nm:#F0997B; --cm:#6a6864;
  }
}

body { font-family:var(--font); font-size:13px; color:var(--text); background:var(--bg3); min-height:100vh; padding:16px; }

.katex { font-size:1.05em !important; }

.page-header { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
.page-title  { font-size:15px; font-weight:500; }
.page-sub    { font-size:12px; color:var(--text3); }
.page-link   { margin-left:auto; font-size:11px; color:var(--blue-tx); text-decoration:none; border:0.5px solid var(--blue-bd); background:var(--blue-bg); padding:3px 9px; border-radius:var(--radius); }
.page-link:hover { opacity:.8; }

.app { display:grid; grid-template-columns:180px 1fr; min-height:600px; border:0.5px solid var(--border2); border-radius:var(--radius-lg); overflow:hidden; background:var(--bg); }

.sidebar { background:var(--bg2); border-right:0.5px solid var(--border2); padding:14px 10px; display:flex; flex-direction:column; gap:16px; overflow-y:auto; }
.sb-label { font-size:10px; font-weight:500; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:6px; }
.chip { display:flex; align-items:center; gap:7px; padding:6px 9px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg); cursor:grab; font-size:12px; color:var(--text); margin-bottom:5px; user-select:none; transition:border-color .12s, opacity .12s; }
.chip:hover { border-color:var(--border3); }
.chip.dragging { opacity:.35; cursor:grabbing; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

.sb-ctrl { display:flex; flex-direction:column; gap:5px; }
.sb-ctrl label { font-size:10px; color:var(--text3); margin-bottom:1px; display:block; }
.sb-ctrl select, .sb-ctrl input { width:100%; font-size:12px; padding:4px 7px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:var(--font); }
.sb-ctrl input { font-family:var(--mono); }
.inline-inputs { display:flex; gap:3px; }
.inline-inputs input { flex:1; min-width:0; }

.main { display:flex; flex-direction:column; background:var(--bg); min-width:0; }
.toolbar { display:flex; align-items:center; gap:8px; padding:9px 14px; border-bottom:0.5px solid var(--border); flex-wrap:wrap; background:var(--bg); }
.tbar-label { font-size:11px; color:var(--text3); }
.tbar-select { font-size:12px; padding:4px 7px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-family:var(--font); cursor:pointer; }
.add-field-btn { margin-left:auto; font-size:11px; padding:4px 10px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-family:var(--font); transition:background .12s; }
.add-field-btn:hover { background:var(--bg2); }

.lanes { flex:1; padding:12px 14px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
.lane { border:0.5px solid var(--border2); border-radius:var(--radius); overflow:hidden; }
.lane-head { display:flex; align-items:center; gap:8px; padding:7px 11px; background:var(--bg2); border-bottom:0.5px solid var(--border); }
.field-badge { font-size:11px; font-weight:500; padding:2px 8px; border-radius:3px; font-family:var(--mono); cursor:pointer; transition:opacity .12s; }
.field-badge:hover { opacity:.7; }
.lane-eq-label { font-size:11px; color:var(--text3); }
.del-lane { margin-left:auto; font-size:10px; color:var(--text3); cursor:pointer; padding:2px 6px; border-radius:2px; border:0.5px solid transparent; background:transparent; font-family:var(--font); transition:color .12s; }
.del-lane:hover { color:#A32D2D; border-color:#F09595; background:#FCEBEB; }

.lane-math { padding:8px 12px; min-height:42px; display:flex; align-items:center; border-bottom:0.5px solid var(--border); overflow-x:auto; }
.math-zero { color:var(--text3); font-size:13px; font-style:italic; }

.term-row { display:flex; flex-wrap:wrap; align-items:center; gap:7px; padding:8px 11px; min-height:50px; transition:background .1s; }
.term-row.drag-over { background:var(--bg2); }
.drop-hint { font-size:11px; color:var(--text3); border:1.5px dashed var(--border2); border-radius:var(--radius); padding:5px 12px; flex:1; min-width:90px; text-align:center; }

.pill { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:4px 9px; border-radius:var(--radius); border:0.5px solid; cursor:pointer; user-select:none; transition:opacity .12s; font-family:var(--font); }
.pill:hover { opacity:.75; }
.pill-x { font-size:10px; opacity:.45; margin-left:1px; cursor:pointer; padding:1px 2px; border-radius:2px; }
.pill-x:hover { opacity:1; }
.pill-adv { background:var(--blue-bg);  border-color:var(--blue-bd);  color:var(--blue-tx); }
.pill-dif { background:var(--teal-bg);  border-color:var(--teal-bd);  color:var(--teal-tx); }
.pill-src { background:var(--amber-bg); border-color:var(--amber-bd); color:var(--amber-tx); }
.pill-flx { background:var(--coral-bg); border-color:var(--coral-bd); color:var(--coral-tx); }
.pill-cus { background:var(--gray-bg);  border-color:var(--gray-bd);  color:var(--gray-tx); }

.ic-bar { display:flex; align-items:center; gap:6px; padding:5px 11px; border-top:0.5px solid var(--border); flex-wrap:wrap; }
.ic-bar-label { font-size:10px; color:var(--text3); }
.ic-sel { font-size:11px; padding:2px 6px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-family:var(--font); cursor:pointer; }
.ic-cus { font-size:11px; padding:2px 6px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-family:var(--mono); width:160px; }

.bc-bar { display:flex; align-items:center; gap:5px; padding:6px 11px; border-top:0.5px solid var(--border); flex-wrap:wrap; }
.bc-bar-label { font-size:10px; color:var(--text3); margin-right:2px; }
.bc-btn { font-size:10px; padding:2px 7px; border-radius:3px; border:0.5px solid var(--border2); background:var(--bg2); color:var(--text2); cursor:pointer; font-family:var(--font); transition:border-color .12s; }
.bc-btn:hover { border-color:var(--border3); }
.bc-dir { background:var(--green-bg);  border-color:var(--green-bd);  color:var(--green-tx); }
.bc-neu { background:var(--blue-bg);   border-color:var(--blue-bd);   color:var(--blue-tx); }
.bc-per { background:var(--purple-bg); border-color:var(--purple-bd); color:var(--purple-tx); }

.code-panel { border-top:0.5px solid var(--border2); padding:12px 14px; background:var(--bg); }
.code-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.code-title { font-size:10px; font-weight:500; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; }
.code-btns { display:flex; gap:6px; align-items:center; }
.cbtn { font-size:11px; padding:4px 11px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text); cursor:pointer; font-family:var(--font); transition:background .12s; }
.cbtn:hover { background:var(--bg2); }
.cbtn-copy { background:var(--purple-bg); border-color:var(--purple-bd); color:var(--purple-tx); }
.copy-notice { font-size:11px; color:var(--green-tx); display:none; }
pre#codebox { font-family:var(--mono); font-size:11.5px; line-height:1.7; color:var(--text2); background:var(--bg2); border-radius:var(--radius); padding:11px 13px; overflow-x:auto; white-space:pre; border:0.5px solid var(--border); }
.kw{color:var(--kw)} .fn{color:var(--fn)} .st{color:var(--st)} .nm{color:var(--nm)} .cm{color:var(--cm)}

.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.42); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:var(--bg); border:0.5px solid var(--border3); border-radius:var(--radius-lg); padding:20px 22px; width:320px; max-width:calc(100vw - 32px); box-shadow:0 8px 32px rgba(0,0,0,.18); }
.modal h4 { font-size:13px; font-weight:500; margin-bottom:14px; color:var(--text); }
.modal-field { margin-top:10px; }
.modal-field label { font-size:11px; color:var(--text2); display:block; margin-bottom:4px; }
.modal-field input, .modal-field select { width:100%; font-size:12px; padding:5px 8px; border-radius:var(--radius); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-family:var(--mono); }
.modal-field select { font-family:var(--font); }
.modal-hint { font-size:10px; color:var(--text3); margin-top:3px; }
.modal-error { font-size:11px; color:#A32D2D; background:#FCEBEB; border:0.5px solid #F09595; border-radius:var(--radius); padding:5px 8px; margin-top:10px; display:none; }
.modal-btns { display:flex; gap:7px; margin-top:16px; justify-content:flex-end; }
.modal-btns button { font-size:12px; padding:5px 13px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text); cursor:pointer; font-family:var(--font); transition:background .12s; }
.modal-btns button:hover { background:var(--bg2); }
.modal-btns .ok { background:var(--purple-bg); border-color:var(--purple-bd); color:var(--purple-tx); }

.hint-bar { display:flex; align-items:center; gap:8px; padding:6px 14px; background:var(--amber-bg); border-top:0.5px solid var(--amber-bd); font-size:11px; color:var(--amber-tx); }
.hint-bar.hidden { display:none; }
.hint-dot { width:6px; height:6px; border-radius:50%; background:var(--amber-bd); flex-shrink:0; }
</style>
</head>
<body>

<div class="page-header">
  <span class="page-title">uPDE</span>
  <span class="page-sub">equation builder</span>
  <a class="page-link" href="https://github.com/saadgroup/upde" target="_blank">GitHub →</a>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div>
      <div class="sb-label">Terms</div>
      <div class="chip" draggable="true" data-type="advection"><span class="dot" style="background:#378ADD"></span>Advection</div>
      <div class="chip" draggable="true" data-type="diffusion"><span class="dot" style="background:#1D9E75"></span>Diffusion</div>
      <div class="chip" draggable="true" data-type="source"><span class="dot" style="background:#BA7517"></span>Source / reaction</div>
      <div class="chip" draggable="true" data-type="flux"><span class="dot" style="background:#D85A30"></span>Flux (conservative)</div>
      <div class="chip" draggable="true" data-type="custom"><span class="dot" style="background:#888780"></span>Custom add_term</div>
    </div>
    <div class="sb-ctrl">
      <div class="sb-label">Solver</div>
      <label>method</label>
      <select id="solver-select" onchange="render()">
        <option value="RK45">RK45 — explicit, non-stiff</option>
        <option value="BDF">BDF — implicit, stiff</option>
        <option value="Radau">Radau — stiff, high accuracy</option>
        <option value="DOP853">DOP853 — explicit, high order</option>
      </select>
      <label>t span</label>
      <div class="inline-inputs">
        <input id="t0" value="0" placeholder="t0" oninput="render()">
        <input id="t1" value="1" placeholder="tf" oninput="render()">
      </div>
    </div>
    <div class="sb-ctrl">
      <div class="sb-label">Grid</div>
      <label>x: start · end · n</label>
      <div class="inline-inputs">
        <input id="gx0" value="0"  oninput="render()">
        <input id="gx1" value="1"  oninput="render()">
        <input id="gn"  value="64" oninput="render()">
      </div>
      <div id="y-grid-row" style="display:none">
        <label style="margin-top:6px;display:block">y: start · end · n</label>
        <div class="inline-inputs">
          <input id="gy0" value="0"  oninput="render()">
          <input id="gy1" value="1"  oninput="render()">
          <input id="gny" value="64" oninput="render()">
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <span class="tbar-label">Dim:</span>
      <select id="dim-select" class="tbar-select" onchange="onDimChange()">
        <option value="1">1D</option>
        <option value="2">2D</option>
      </select>
      <button class="add-field-btn" onclick="promptAddField()">+ add field</button>
      <button class="add-field-btn" onclick="resetAll()" style="margin-left:6px;color:var(--text3)">reset</button>
    </div>
    <div id="hint-bar" class="hint-bar hidden">
      <span class="hint-dot"></span><span id="hint-text"></span>
    </div>
    <div class="lanes" id="lanes"></div>
    <div class="code-panel">
      <div class="code-header">
        <span class="code-title">Generated code</span>
        <div class="code-btns">
          <span class="copy-notice" id="copy-notice">Copied!</span>
          <button class="cbtn cbtn-copy" onclick="copyCode()">Copy code</button>
          <button class="cbtn" onclick="downloadCode()">Download .py</button>
        </div>
      </div>
      <pre id="codebox"></pre>
    </div>
  </div>
</div>

<script>
/* ── KaTeX helper ── */
function tex(latex, el) {
  if (typeof katex === 'undefined') { el.textContent = latex; return; }
  try { katex.render(latex, el, { throwOnError:false, displayMode:false }); }
  catch(e) { el.textContent = latex; }
}

/* ── Symbol helpers ── */
/* For LaTeX display we ALWAYS want a symbol, never a raw number.
   Exception: if the user typed a proper math symbol like 'alpha',
   'nu', 'D', 'c' etc. we pass it through as-is (it renders nicely).
   Numbers like 0.01 are replaced by the canonical fallback symbol. */
function toSym(val, fallback) {
  if (!val || !val.trim()) return fallback;
  const v = val.trim();
  /* Accept only pure identifier tokens — no digits-only, no dots, no lambdas */
  if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(v)) return v;
  /* Everything else (numbers, lambdas, expressions) → use fallback symbol */
  return fallback;
}

/* ── LaTeX term builders ── */
function termLatex(t, fname) {
  const p = t.params, d2 = is2d();

  if (t.type === 'advection') {
    if (d2) {
      const cx = toSym(p.velocity_x, 'c_x'), cy = toSym(p.velocity_y, 'c_y');
      return `- ${cx}\\,\\frac{\\partial ${fname}}{\\partial x} - ${cy}\\,\\frac{\\partial ${fname}}{\\partial y}`;
    }
    const c = toSym(p.velocity, 'c');
    return `- ${c}\\,\\frac{\\partial ${fname}}{\\partial x}`;
  }

  if (t.type === 'diffusion') {
    if (d2) {
      if (p.diffusivity_x || p.diffusivity_y) {
        const Dx = toSym(p.diffusivity_x, 'D_x'), Dy = toSym(p.diffusivity_y, 'D_y');
        return `\\frac{\\partial}{\\partial x}\\!\\left(${Dx}\\frac{\\partial ${fname}}{\\partial x}\\right)+\\frac{\\partial}{\\partial y}\\!\\left(${Dy}\\frac{\\partial ${fname}}{\\partial y}\\right)`;
      }
      const D = toSym(p.diffusivity, 'D');
      return `\\nabla\\cdot\\!\\left(${D}\\,\\nabla ${fname}\\right)`;
    }
    const D = toSym(p.diffusivity, 'D');
    return `\\frac{\\partial}{\\partial x}\\!\\left(${D}\\,\\frac{\\partial ${fname}}{\\partial x}\\right)`;
  }

  if (t.type === 'source')
    return `R(${fname})`;

  if (t.type === 'flux') {
    if (d2) return `- \\frac{\\partial F(${fname})}{\\partial x} - \\frac{\\partial G(${fname})}{\\partial y}`;
    return `- \\frac{\\partial F(${fname})}{\\partial x}`;
  }

  if (t.type === 'custom')
    return `\\mathcal{L}(${fname})`;

  return '0';
}

/* ── State ── */
const TERM_META = {
  advection:{ cls:'pill-adv', dot:'#378ADD', label:'advection' },
  diffusion:{ cls:'pill-dif', dot:'#1D9E75', label:'diffusion' },
  source:   { cls:'pill-src', dot:'#BA7517', label:'source'    },
  flux:     { cls:'pill-flx', dot:'#D85A30', label:'flux'      },
  custom:   { cls:'pill-cus', dot:'#888780', label:'custom'    },
};
const BADGE_STYLES = [
  {bg:'#EEEDFE',tx:'#3C3489'},{bg:'#E1F5EE',tx:'#085041'},
  {bg:'#FAECE7',tx:'#712B13'},{bg:'#E6F1FB',tx:'#0C447C'},
];
const IC_OPTS = [
  {v:'zero', l:'0.0'},{v:'one', l:'1.0'},{v:'sin', l:'sin(πx)'},
  {v:'gauss',l:'Gaussian pulse'},{v:'step',l:'Step function'},{v:'custom',l:'custom…'},
];

let fields = [{
  id:'f0', name:'T',
  terms:[
    {id:'t0', type:'advection', params:{velocity:'1.0'}},
    {id:'t1', type:'diffusion', params:{diffusivity:'0.01'}},
  ],
  bcs:{ left:{kind:'dirichlet',value:'1.0'}, right:{kind:'dirichlet',value:'0.0'} },
  ic:{ preset:'zero', custom:'' },
}];
let nextFid=1, nextTid=10, dragType=null;

/* ── Helpers ── */
const is2d = () => document.getElementById('dim-select').value === '2';
const gv   = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
const esc  = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function defaultParams(type, fname, allFields) {
  fname = fname||'u'; const d2=is2d();
  /* Build the full coupled field list for lambda signatures */
  const others = (allFields||[fname]).filter(n=>n!==fname);
  const coupledArgs = others.length ? ', ' + others.join(', ') : '';
  const srcArgs  = `x, t, ${fname}${coupledArgs}`;
  const custArgs = `${fname}${coupledArgs}, t, Dx, Dxx`;
  if (type==='advection') return d2?{velocity_x:'1.0',velocity_y:'0.0'}:{velocity:'1.0'};
  if (type==='diffusion') return {diffusivity:'0.01'};
  if (type==='source')    return {expr:`lambda ${srcArgs}: 0.0`};
  if (type==='flux')      return d2
    ?{flux_x:`lambda ${fname}: 0.5*${fname}**2`,flux_y:`lambda ${fname}: 0.5*${fname}**2`,scheme:'upwind'}
    :{flux:`lambda ${fname}: 0.5*${fname}**2`, scheme:'upwind'};
  if (type==='custom')    return {fn:`lambda ${custArgs}: 0.0`};
  return {};
}
function defaultBCs() {
  return is2d()
    ?{left:{kind:'dirichlet',value:'0.0'},right:{kind:'neumann',value:'0.0'},
      bottom:{kind:'neumann',value:'0.0'},top:{kind:'neumann',value:'0.0'}}
    :{left:{kind:'dirichlet',value:'1.0'},right:{kind:'dirichlet',value:'0.0'}};
}

/* ── Field management ── */
function promptAddField() {
  const body =
    `<div class="modal-field"><label>field name (e.g. u, v, T, phi)</label>` +
    `<input id="mf_newname" placeholder="e.g. v" maxlength="20" autocomplete="off">` +
    `<div class="modal-hint">letters, digits, underscores — must be unique</div></div>` +
    `<div class="modal-error" id="mf_err"></div>`;
  showModal('New field', body, () => {
    const raw   = (document.getElementById('mf_newname').value||'').trim();
    const err   = document.getElementById('mf_err');
    const taken = new Set(fields.map(f=>f.name));
    if (!raw || !/^[A-Za-z_][A-Za-z0-9_]*$/.test(raw)) {
      err.textContent='Invalid name. Use letters, digits, underscores.'; err.style.display='block'; return;
    }
    if (taken.has(raw)) {
      err.textContent=`'${raw}' is already used by another field.`; err.style.display='block'; return;
    }
    fields.push({id:'f'+(nextFid++),name:raw,terms:[],bcs:defaultBCs(),ic:{preset:'zero',custom:''}});
    closeModal(); render();
  }, true);
}

function removeField(fid) {
  if (fields.length===1) return;
  fields=fields.filter(f=>f.id!==fid); render();
}
function removeTerm(fid, tid) {
  const f=fields.find(x=>x.id===fid);
  if (f) { f.terms=f.terms.filter(t=>t.id!==tid); render(); }
}

/* ── IC ── */
function icExprFor(f) {
  const ic=f.ic||{preset:'zero',custom:''};
  if (ic.preset==='zero')   return '0.0';
  if (ic.preset==='one')    return '1.0';
  if (ic.preset==='sin')    return 'lambda x: np.sin(np.pi * x)';
  if (ic.preset==='gauss')  return 'lambda x: np.exp(-((x - 0.5)**2) / 0.02)';
  if (ic.preset==='step')   return 'lambda x: (x < 0.5).astype(float)';
  if (ic.preset==='custom') return ic.custom||'lambda x: 0.0';
  return '0.0';
}
function onIcChange(fid, sel) {
  const f=fields.find(x=>x.id===fid); if (!f) return;
  f.ic.preset=sel.value;
  const ci=document.getElementById('ic-cus-'+fid);
  if (ci) ci.style.display=sel.value==='custom'?'inline-block':'none';
  render();
}
function onIcCustom(fid, inp) {
  const f=fields.find(x=>x.id===fid); if (f) { f.ic.custom=inp.value; render(); }
}

/* ── Pill label ── */
function pillLabel(t) {
  const p=t.params, d2=is2d();
  if (t.type==='advection') return d2?`adv  vx=${p.velocity_x} vy=${p.velocity_y}`:`adv  c=${p.velocity}`;
  if (t.type==='diffusion') return p.diffusivity_x?`diff  Dx=${p.diffusivity_x} Dy=${p.diffusivity_y}`:`diff  D=${p.diffusivity}`;
  if (t.type==='source')    return `src  ${(p.expr||'').slice(0,20)}`;
  if (t.type==='flux')      return d2?`flux  ${p.scheme||'upwind'}`:`flux  ${(p.flux||'').slice(0,14)}`;
  if (t.type==='custom')    return `custom  ${(p.fn||'').slice(0,16)}`;
  return t.type;
}

/* ── BC helpers ── */
function bcCls(bc) {
  if (!bc) return 'bc-btn';
  return {dirichlet:'bc-btn bc-dir',neumann:'bc-btn bc-neu',periodic:'bc-btn bc-per'}[bc.kind]||'bc-btn';
}
function bcTxt(side, bc) {
  if (!bc) return side+': —';
  if (bc.kind==='periodic') return side+': periodic';
  return side+': '+bc.kind+' = '+bc.value;
}

/* ── Stiffness hint ── */
function updateHint() {
  const bar=document.getElementById('hint-bar');
  const txt=document.getElementById('hint-text');
  const sel=document.getElementById('solver-select');
  let hasDiff=false, hasRxn=false;
  fields.forEach(f=>f.terms.forEach(t=>{
    if (t.type==='diffusion') hasDiff=true;
    if (t.type==='source')    hasRxn=true;
  }));
  if (hasDiff && is2d()) {
    bar.classList.remove('hidden');
    txt.textContent="2D diffusion is stiff — consider method='BDF' for stability.";
    sel.style.borderColor=sel.value==='RK45'?'var(--amber-bd)':'';
  } else if (hasDiff && hasRxn) {
    bar.classList.remove('hidden');
    txt.textContent='Reaction-diffusion systems are often stiff — BDF or Radau recommended.';
    sel.style.borderColor=sel.value==='RK45'?'var(--amber-bd)':'';
  } else {
    bar.classList.add('hidden');
    sel.style.borderColor='';
  }
}

/* ── Render lanes ── */
function renderLanes() {
  const d2=is2d(), container=document.getElementById('lanes');
  container.innerHTML='';

  fields.forEach((f, fi)=>{
    const bs=BADGE_STYLES[fi%BADGE_STYLES.length];
    const div=document.createElement('div');
    div.className='lane';

    const sides=d2?['left','right','bottom','top']:['left','right'];
    const bcBtns=sides.map(s=>{
      const bc=f.bcs[s];
      return `<button class="${bcCls(bc)}" onclick="openBCModal('${f.id}','${s}')">${bcTxt(s,bc)}</button>`;
    }).join('');

    const icPreset=(f.ic&&f.ic.preset)||'zero';
    const icOpts=IC_OPTS.map(o=>`<option value="${o.v}"${o.v===icPreset?' selected':''}>${o.l}</option>`).join('');

    div.innerHTML=`
      <div class="lane-head">
        <span class="field-badge" style="background:${bs.bg};color:${bs.tx}" title="click to rename" onclick="renameField('${f.id}')">${f.name}</span>
        <span class="lane-eq-label">∂${f.name}/∂t =</span>
        ${fields.length>1?`<button class="del-lane" onclick="removeField('${f.id}')">remove</button>`:''}
      </div>
      <div class="lane-math" id="lm-${f.id}"></div>
      <div class="term-row" id="tr-${f.id}" data-fid="${f.id}"></div>
      <div class="ic-bar">
        <span class="ic-bar-label">IC:</span>
        <select class="ic-sel" onchange="onIcChange('${f.id}',this)">${icOpts}</select>
        <input class="ic-cus" id="ic-cus-${f.id}"
          value="${esc((f.ic&&f.ic.custom)||'')}"
          placeholder="lambda x: ..."
          style="display:${icPreset==='custom'?'inline-block':'none'}"
          oninput="onIcCustom('${f.id}',this)">
      </div>
      <div class="bc-bar"><span class="bc-bar-label">BCs:</span>${bcBtns}</div>`;

    container.appendChild(div);

    /* LaTeX math row */
    const mathEl=div.querySelector('.lane-math');
    if (f.terms.length===0) {
      mathEl.innerHTML='<span class="math-zero">0</span>';
    } else {
      const latex=f.terms.map(t=>termLatex(t,f.name)).join('+');
      tex(latex, mathEl);
    }

    /* Pills */
    const row=div.querySelector('.term-row');
    f.terms.forEach(t=>{
      const pill=document.createElement('span');
      pill.className=`pill ${TERM_META[t.type].cls}`;
      pill.innerHTML=`<span class="dot" style="background:${TERM_META[t.type].dot}"></span>${pillLabel(t)}<span class="pill-x">✕</span>`;
      pill.addEventListener('click', e=>{
        if (!e.target.classList.contains('pill-x')) openTermModal(f.id,t.id);
      });
      pill.querySelector('.pill-x').addEventListener('click', e=>{
        e.stopPropagation(); removeTerm(f.id,t.id);
      });
      row.appendChild(pill);
    });

    const hint=document.createElement('span');
    hint.className='drop-hint'; hint.textContent='drop term here';
    row.appendChild(hint);

    row.addEventListener('dragover',  e=>{e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave', ()=>row.classList.remove('drag-over'));
    row.addEventListener('drop', e=>{
      e.preventDefault(); row.classList.remove('drag-over');
      if (!dragType) return;
      const fid=row.dataset.fid, ff=fields.find(x=>x.id===fid);
      const newT={id:'t'+(nextTid++),type:dragType,params:defaultParams(dragType,ff.name,fields.map(x=>x.name))};
      ff.terms.push(newT); dragType=null;
      render(); setTimeout(()=>openTermModal(fid,newT.id),40);
    });
  });
}

/* ── Term modal ── */
function openTermModal(fid, tid) {
  const f=fields.find(x=>x.id===fid), t=f.terms.find(x=>x.id===tid);
  const d2=is2d(), p=t.params, n=f.name;
  /* All field names for lambda signatures and coupling notes */
  const allNames  = fields.map(x=>x.name);
  const others    = allNames.filter(x=>x!==n);
  const coupledArgs = others.length ? ', ' + others.join(', ') : '';
  const srcArgs   = `x, t, ${n}${coupledArgs}`;
  const custArgs  = `${n}${coupledArgs}, t, Dx, Dxx`;
  const couplingNote = others.length
    ? `; coupled fields: <b>${others.join(', ')}</b>`
    : '';
  let body='';

  if (t.type==='advection') {
    body = d2
      ? mf('velocity_x',p.velocity_x||'1.0')+mf('velocity_y',p.velocity_y||'0.0')
      : mf('velocity',p.velocity||'1.0');
    body += mh(`scalar, callable(x[,y], t, **fields), or field name string, e.g. '${n}'${couplingNote}`);
  } else if (t.type==='diffusion') {
    body = d2
      ? mf('diffusivity (isotropic)',p.diffusivity||'0.01')
        +mf('diffusivity_x (overrides above)',p.diffusivity_x||'')
        +mf('diffusivity_y (overrides above)',p.diffusivity_y||'')
      : mf('diffusivity',p.diffusivity||'0.01');
    body += mh(`scalar, ndarray, or callable(x[,y], t, ${n}, **fields)${couplingNote}`);
  } else if (t.type==='source') {
    body = mf('expr', p.expr||`lambda ${srcArgs}: 0.0`);
    body += mh(`callable(x[,y], t, **fields) → ndarray — t is solver time${couplingNote}`);
  } else if (t.type==='flux') {
    body = d2
      ? mf('flux_x',p.flux_x||`lambda ${n}: 0.5*${n}**2`)
        +mf('flux_y',p.flux_y||`lambda ${n}: 0.5*${n}**2`)
        +ms('scheme',p.scheme||'upwind',['upwind','central'])
      : mf('flux',p.flux||`lambda ${n}: 0.5*${n}**2`)
        +ms('scheme',p.scheme||'upwind',['upwind','central']);
    body += mh(`flux(${n}) → ndarray of same shape; wave speed inferred automatically`);
  } else if (t.type==='custom') {
    body = mf('fn', p.fn||`lambda ${custArgs}: 0.0`);
    body += mh(`args injected by name: t (solver time), Dx, Dy, Dxx, Dyy, Div_x, Div_y${couplingNote}`);
  }

  showModal(`Edit ${TERM_META[t.type].label}`, body, ()=>saveTermModal(fid,tid,t.type));
}

function saveTermModal(fid, tid, type) {
  const f=fields.find(x=>x.id===fid), t=f.terms.find(x=>x.id===tid);
  const d2=is2d();
  const g=key=>{ const el=document.getElementById('mf_'+key.replace(/[^a-z0-9]/gi,'_')); return el?el.value.trim():''; };

  if (type==='advection') {
    t.params=d2?{velocity_x:g('velocity_x'),velocity_y:g('velocity_y')}:{velocity:g('velocity')};
  } else if (type==='diffusion') {
    if (d2) {
      const dx=g('diffusivity_x__overrides_above_'), dy=g('diffusivity_y__overrides_above_');
      t.params=(dx||dy)
        ?{diffusivity_x:dx||g('diffusivity__isotropic_'),diffusivity_y:dy||g('diffusivity__isotropic_')}
        :{diffusivity:g('diffusivity__isotropic_')};
    } else { t.params={diffusivity:g('diffusivity')}; }
  } else if (type==='source') { t.params={expr:g('expr')};
  } else if (type==='flux') {
    t.params=d2
      ?{flux_x:g('flux_x'),flux_y:g('flux_y'),scheme:g('scheme')}
      :{flux:g('flux'),scheme:g('scheme')};
  } else if (type==='custom') { t.params={fn:g('fn')}; }
  closeModal(); render();
}

/* ── BC modal ── */
function openBCModal(fid, side) {
  const f=fields.find(x=>x.id===fid), bc=f.bcs[side]||{kind:'neumann',value:'0.0'};
  const body=ms('kind',bc.kind,['dirichlet','neumann','periodic'])+mf('value',bc.value||'0.0');
  showModal(`${side} BC — field ${f.name}`, body, ()=>{
    const kind=document.getElementById('mf_kind').value;
    const value=document.getElementById('mf_value').value.trim();
    if (kind==='periodic') {
      ['left','right','bottom','top'].forEach(s=>{ if (f.bcs[s]!==undefined) f.bcs[s]={kind:'periodic',value:''}; });
    } else { f.bcs[side]={kind,value}; }
    closeModal(); render();
  });
}

/* ── Modal builders ── */
function mf(label, val) {
  const id='mf_'+label.replace(/[^a-z0-9]/gi,'_');
  const safe=String(val).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return `<div class="modal-field"><label>${label}</label><input id="${id}" value="${safe}" autocomplete="off"></div>`;
}
function ms(label, val, opts) {
  const id='mf_'+label.replace(/[^a-z0-9]/gi,'_');
  return `<div class="modal-field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select></div>`;
}
function mh(text) { return `<div class="modal-field"><div class="modal-hint">${text}</div></div>`; }

let _ok=null;
function showModal(title, body, onOk, stayOnErr) {
  closeModal(); _ok=onOk;
  const bg=document.createElement('div');
  bg.className='modal-bg'; bg.id='modal-overlay';
  bg.innerHTML=`<div class="modal"><h4>${title}</h4>${body}<div class="modal-btns"><button onclick="closeModal()">Cancel</button><button class="ok" id="modal-ok-btn">Save</button></div></div>`;
  bg.addEventListener('click',e=>{ if (e.target===bg) closeModal(); });
  bg.querySelector('#modal-ok-btn').addEventListener('click',()=>_ok&&_ok());
  bg.addEventListener('keydown',e=>{
    if (e.key==='Escape') { e.preventDefault(); closeModal(); }
    if (e.key==='Enter' && e.target.tagName!=='SELECT') { e.preventDefault(); _ok&&_ok(); }
  });
  document.body.appendChild(bg);
  const first=bg.querySelector('input,select'); if (first){first.focus();first.select&&first.select();}
}
function closeModal() {
  const el=document.getElementById('modal-overlay'); if (el) el.remove(); _ok=null;
}

/* ── Code generation ── */
function termCodeHTML(f, t) {
  const n=f.name, p=t.params, d2=is2d();
  if (t.type==='advection') return d2
    ?`eq_${n}.add_advection(velocity_x=<span class="st">${esc(p.velocity_x||'1.0')}</span>, velocity_y=<span class="st">${esc(p.velocity_y||'0.0')}</span>)`
    :`eq_${n}.add_advection(velocity=<span class="st">${esc(p.velocity||'1.0')}</span>)`;
  if (t.type==='diffusion') return p.diffusivity_x
    ?`eq_${n}.add_diffusion(diffusivity_x=<span class="st">${esc(p.diffusivity_x)}</span>, diffusivity_y=<span class="st">${esc(p.diffusivity_y)}</span>)`
    :`eq_${n}.add_diffusion(diffusivity=<span class="st">${esc(p.diffusivity||'0.01')}</span>)`;
  if (t.type==='source')
    return `eq_${n}.add_source(expr=<span class="st">${esc(p.expr)}</span>)`;
  if (t.type==='flux') return d2
    ?`eq_${n}.add_flux(flux_x=<span class="st">${esc(p.flux_x)}</span>, flux_y=<span class="st">${esc(p.flux_y)}</span>, scheme=<span class="st">'${p.scheme||'upwind'}'</span>)`
    :`eq_${n}.add_flux(flux=<span class="st">${esc(p.flux)}</span>, scheme=<span class="st">'${p.scheme||'upwind'}'</span>)`;
  if (t.type==='custom')
    return `eq_${n}.add_term(<span class="st">${esc(p.fn)}</span>)`;
  return '';
}

function buildCodeHTML() {
  const d2=is2d(), solver=gv('solver-select').split(' ')[0];
  const t0=gv('t0')||'0', t1=gv('t1')||'1';
  const gx0=gv('gx0')||'0', gx1=gv('gx1')||'1', gn=gv('gn')||'64';
  const gy0=gv('gy0')||'0', gy1=gv('gy1')||'1', gny=gv('gny')||'64';
  const L=[];

  L.push(`<span class="kw">import</span> numpy <span class="kw">as</span> np`);
  L.push(`<span class="kw">from</span> upde <span class="kw">import</span> PDE, PDESystem`);
  L.push('');
  L.push(`x = np.linspace(<span class="nm">${gx0}</span>, <span class="nm">${gx1}</span>, <span class="nm">${gn}</span>)`);
  if (d2) L.push(`y = np.linspace(<span class="nm">${gy0}</span>, <span class="nm">${gy1}</span>, <span class="nm">${gny}</span>)`);
  L.push('');

  fields.forEach(f=>{
    const n=f.name, yarg=d2?', y=y':'';
    L.push(`eq_${n} = PDE(<span class="st">'${n}'</span>, x=x${yarg})`);
    f.terms.forEach(t=>L.push(termCodeHTML(f,t)));
    const sides=d2?['left','right','bottom','top']:['left','right'];
    const hasPer=Object.values(f.bcs).some(b=>b&&b.kind==='periodic');
    if (hasPer) {
      L.push(`eq_${n}.set_bc(kind=<span class="st">'periodic'</span>, side=<span class="st">'all'</span>)`);
    } else {
      sides.forEach(s=>{
        const bc=f.bcs[s];
        if (bc && bc.kind!=='periodic')
          L.push(`eq_${n}.set_bc(side=<span class="st">'${s}'</span>, kind=<span class="st">'${bc.kind}'</span>, value=<span class="st">${esc(bc.value)}</span>)`);
      });
    }
    L.push(`eq_${n}.set_ic(<span class="st">${esc(icExprFor(f))}</span>)`);
    L.push('');
  });

  if (fields.length===1) {
    L.push(`sol = eq_${fields[0].name}.solve(`);
  } else {
    L.push(`sol = PDESystem([${fields.map(f=>`eq_${f.name}`).join(', ')}]).solve(`);
  }
  L.push(`    t_span=(<span class="nm">${t0}</span>, <span class="nm">${t1}</span>),`);
  L.push(`    method=<span class="st">'${solver}'</span>,`);
  L.push(`)`);
  L.push('');
  fields.forEach(f=>{
    L.push(`<span class="cm"># sol.${f.name}  →  shape (${d2?'nx, ny, nt':'nx, nt'})</span>`);
  });
  if (fields.length > 1) {
    const fnames = fields.map(f=>f.name).join(', ');
    L.push('');
    L.push(`<span class="cm"># coupled fields available in any callable: ${fnames}</span>`);
    L.push(`<span class="cm"># e.g. lambda x, t, ${fields[0].name}, ${fields[1].name}: ...</span>`);
  }
  return L.join('\n');
}

/* ── Copy / Download ── */
function copyCode() {
  const text=document.getElementById('codebox').innerText;
  const flash=()=>{ const el=document.getElementById('copy-notice'); el.style.display='inline'; setTimeout(()=>el.style.display='none',1800); };
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(flash).catch(fb); } else { fb(); }
  function fb() {
    const ta=Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); flash();
  }
}
function downloadCode() {
  const text=document.getElementById('codebox').innerText;
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([text],{type:'text/plain'})), download:'upde_equation.py'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

/* ── Rename field ── */
function renameField(fid) {
  const f=fields.find(x=>x.id===fid);
  const body=
    `<div class="modal-field"><label>new name for field <b>${f.name}</b></label>`+
    `<input id="mf_rename" value="${esc(f.name)}" maxlength="20" autocomplete="off">`+
    `<div class="modal-hint">letters, digits, underscores — must be unique</div></div>`+
    `<div class="modal-error" id="mf_rename_err"></div>`;
  showModal('Rename field', body, ()=>{
    const raw=(document.getElementById('mf_rename').value||'').trim();
    const err=document.getElementById('mf_rename_err');
    const taken=new Set(fields.filter(x=>x.id!==fid).map(x=>x.name));
    if (!raw || !/^[A-Za-z_][A-Za-z0-9_]*$/.test(raw)) {
      err.textContent='Invalid name. Use letters, digits, underscores.'; err.style.display='block'; return;
    }
    if (taken.has(raw)) {
      err.textContent=`'${raw}' is already used.`; err.style.display='block'; return;
    }
    /* Update field name and fix any term params that referenced the old name */
    const old=f.name; f.name=raw;
    f.terms.forEach(t=>{
      ['velocity','velocity_x','velocity_y','expr','flux','flux_x','flux_y','fn'].forEach(k=>{
        if (t.params[k]) t.params[k]=t.params[k].replaceAll(old, raw);
      });
    });
    closeModal(); render();
  }, true);
}

/* ── Reset ── */
function resetAll() {
  if (!confirm('Reset to blank slate?')) return;
  fields=[{
    id:'f0', name:'T',
    terms:[],
    bcs:{ left:{kind:'neumann',value:'0.0'}, right:{kind:'neumann',value:'0.0'} },
    ic:{ preset:'zero', custom:'' },
  }];
  nextFid=1; nextTid=10;
  document.getElementById('dim-select').value='1';
  document.getElementById('solver-select').value='RK45';
  document.getElementById('t0').value='0';
  document.getElementById('t1').value='1';
  document.getElementById('gx0').value='0';
  document.getElementById('gx1').value='1';
  document.getElementById('gn').value='64';
  document.getElementById('y-grid-row').style.display='none';
  render();
}

/* ── Dim change ── */
function onDimChange() {
  const d2=is2d();
  document.getElementById('y-grid-row').style.display=d2?'block':'none';
  fields.forEach(f=>{ f.terms.forEach(t=>{ t.params=defaultParams(t.type,f.name,fields.map(x=>x.name)); }); f.bcs=defaultBCs(); });
  render();
}

/* ── Drag setup ── */
document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('dragstart',()=>{ dragType=chip.dataset.type; setTimeout(()=>chip.classList.add('dragging'),0); });
  chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
});

/* ── Render ── */
function render() {
  renderLanes();
  document.getElementById('codebox').innerHTML=buildCodeHTML();
  updateHint();
}

/* KaTeX loads via defer — wait for it before first render */
function tryRender() {
  if (typeof katex !== 'undefined') { render(); }
  else { window.addEventListener('load', render, {once:true}); }
}
document.addEventListener('DOMContentLoaded', tryRender);
