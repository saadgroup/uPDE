<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uPDE — you too can solve PDEs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #viewer {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #slide {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* nav arrows */
  .arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    z-index: 10;
  }
  .arrow:hover { background: rgba(255,255,255,0.18); }
  .arrow.disabled { opacity: 0.15; pointer-events: none; }
  #prev { left: 16px; }
  #next { right: 16px; }

  /* counter */
  #counter {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    z-index: 10;
  }

  /* pip badge */
  #pip {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(0,201,177,0.4);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: monospace;
    font-size: 0.8rem;
    color: #00C9B1;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, border-color 0.15s;
  }
  #pip:hover { background: rgba(0,201,177,0.1); border-color: #00C9B1; }
  #pip.copied { color: #F4A942; border-color: rgba(244,169,66,0.4); }

  /* github link */
  #ghlink {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    z-index: 10;
    transition: background 0.15s;
  }
  #ghlink:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* dot indicators */
  #dots {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active {
    background: #7C6FFF;
    transform: scale(1.4);
  }

  /* hint */
  #hint {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(124,111,255,0.25);
    border: 1px solid rgba(124,111,255,0.6);
    border-radius: 999px;
    padding: 10px 24px;
    font-size: 0.9rem;
    color: #fff;
    white-space: nowrap;
    z-index: 10;
    transition: opacity 1.5s ease;
  }
  #hint.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<a id="ghlink" href="https://github.com/saadgroup/upde">⭐ GitHub</a>
<div id="pip" onclick="copyPip()">$ pip install upde</div>

<div id="viewer">
  <img id="slide" src="" alt="uPDE slide">
</div>

<button class="arrow disabled" id="prev" onclick="go(-1)">&#8592;</button>
<button class="arrow" id="next" onclick="go(1)">&#8594;</button>

<div id="dots"></div>
<div id="hint">&#8592; arrow keys or click to navigate &#8594;</div>
<div id="counter">1 / 12</div>

<script>
  const total = 12;
  let current = 1;

  const slide   = document.getElementById('slide');
  const counter = document.getElementById('counter');
  const prev    = document.getElementById('prev');
  const next    = document.getElementById('next');
  const dotsEl  = document.getElementById('dots');

  for (let i = 1; i <= total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 1 ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function goTo(n) {
    current = n;
    slide.src = `upde_keynote_Page_${pad(current)}.png`;
    counter.textContent = `${current} / ${total}`;
    prev.classList.toggle('disabled', current === 1);
    next.classList.toggle('disabled', current === total);
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i + 1 === current);
    });
  }

  function go(dir) { goTo(Math.min(Math.max(current + dir, 1), total)); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') go(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp') go(-1);
  });

  let tx = 0;
  document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
  document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  });

  function copyPip() {
    navigator.clipboard.writeText('pip install upde').then(() => {
      const el = document.getElementById('pip');
      el.textContent = '✓ copied!';
      el.classList.add('copied');
      setTimeout(() => {
        el.textContent = '$ pip install upde';
        el.classList.remove('copied');
      }, 2000);
    });
  }

  goTo(1);

  const hint = document.getElementById('hint');
  hint.style.opacity = '0';
  hint.style.transition = 'none';

  slide.addEventListener('load', () => {
    hint.style.transition = 'opacity 0.5s ease';
    hint.style.opacity = '1';
    setTimeout(() => {
      hint.style.transition = 'opacity 1.5s ease';
      hint.style.opacity = '0';
    }, 8000);
  }, { once: true });

  document.addEventListener('keydown', () => { hint.style.opacity = '0'; }, { once: true });
  document.addEventListener('touchend', () => { hint.style.opacity = '0'; }, { once: true });
</script>
</body>
</html>
